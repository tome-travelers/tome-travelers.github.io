<html>

<head>
    <title>Tome Travelers</title>
    <meta charset="utf-8">

    <link rel="shortcut icon" type="image/png" href="favicon.png" sizes="any">
    <link rel="stylesheet" href="css/tome_travelers.css">
    <script src="js/game.min.js"></script>
</head>

<body>
    <div>
        <p onclick="restartGame();">Tome Travelers</p>
        <canvas id="canvas" width="1920" height="1080" ondblclick="toggleFullscreen();"></canvas>
    </div>
    <footer>
        <div>Copyright &copy; 2020 Tome Travelers. All Rights Reserved.
        Inquiries to: <a href="mailto:tome.travelers@pm.me">tome.travelers@pm.me</a></div>
    </footer>
</body>

<script>
    TT.Game.start();

    function restartGame() {
        TT.Storage.clearState();
        window.location.replace("index.html");
    }

    function toggleFullscreen() {
        let canvas = document.getElementById("canvas");

        document.onfullscreenchange = function (event) {
            event.target.classList.toggle("invisible_cursor");
        }

        if (document.fullscreenElement === canvas) {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        } else {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            }
        }
    }
</script>

</html>
